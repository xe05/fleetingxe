- vibe: Seer
  by: Iko
  description: >
    You decipher death threats hidden in chemtrails, and guess the names whispered by models in fashion magazines. Your collection of coincidences, patterns, and warnings grows each day. All you see are signs. When your soul drowns under the weight of unshareable secrets, you perform obscure rituals with feathers, bottle caps, and bone powder. You’re a Seer, and you serve Lucy the Eyeless.

  offering:
    - Burn your eyes
    - Walk blindfolded on the highway
    - Immerse your face in melted wax
    - Kiss something dead
    - Bury yourself underground
    - Eat pages of an esoteric manuscript

  gifts:
    - KNOW FACES, learn something about a stranger
    - DEADSPEAK, converse with dead things
    - INDUCE HALLUCINATION, make others see what you want them to
    - LIE, tell or detect lies
    - SUMMON DARKNESS, create a cloud of absolute night
    - CONSULT ORACLE, ask Lucy the Eyeless one question, requires spilled blood

  gear:
    - Unicorn keyring, Candies, Pocket pistol
    - Razor blades, Tarot cards, Fake ID
    - Stress ball, Divination pendulum, Fountain pen
    - Scissors, Glue stick, Glass eye
    - Offering knife, Mirror, Mummified finger
    - Crystals, Analog calculator, D20

  saint:
    name: Lucy the Eyeless
    form: Old, wrinkled woman with thigh-length hair and void eye sockets, likes to wander naked | An eye, surrounded by flames
    shrine: Broken boat washed ashore
    clergy: Procession of blindfolded women
    omen: Blood tears
    relic: Bone powder - when diluted and consumed, the drinker vomits and passes out when they tell a lie

  scars:
    - EPIPHANY. For just a moment you have a vision of when and how you will die. How are you going to live with that?
    - DARKSIGHTED. Lights break, candles extinguish, night eats the sun. Everything is dark – at least, until you eat ashes, dirt, or bone powder. What stands out in the darkness that others can’t perceive?
    - FOLLOWED. Now you remember. It’s there and it’s always been there, but it only appears when you’re alone. It’s become a familiar presence now, but it still feels gross. You need to make it go away, or tame it. What or who is it?
    - KISSED. You feel Lucy the Eyeless’s hand caress your cheek, and you fall to your knees, sobbing. You can't use Weird until someone or something mends your sorrow. What weighs so heavily on your heart?
    - HOLLOW. The power of Lucy inhabits and transforms you. A wave of pure Weird consumes your eyes. Your eye sockets are now hollow. Which of your other senses become heightened?
