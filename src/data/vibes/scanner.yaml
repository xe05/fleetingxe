- vibe: Scanner
  by: Iko
  description: >
    In your crib, it’s easier to find video tapes than food or clothes. You hack community TV streams, turn them into masterpieces, and bounce them back to their oblivious audience. The most obscure indie production co-ops, film archives, and cursed VHS dealers owe you one. You find reality dull and feast on video like a famished carnivore indulges in fresh flesh. You’re a Scanner, and you serve the Monitor. 

  offering:
    - Devour magnetic tapes
    - Connect video equipment to your flesh
    - Watch TV until your eyes bleed
    - Film someone who should be left alone
    - Sell cursed DVDs to oblivious souls
    - Take the night shift in an XXX video rental store

  gifts:
    - PAUSE, stop time until you inhale
    - RECALL, recollect an image from memory with high precision 
    - BROADCAST, emit streams to TV screens
    - ETRACT, pull objects from video screens
    - OVERLOAD BRAIN, confuse living creatures
    - BURST, cause TVs and other screens to explode

  gear:
   - Universal remote, Sleeping pills, Found footage VHS
   - A/V cables, Key to storage room, Channel 7 tech pass
   - Infrared camcorder, Paper cutter, Rain cloak
   - Signal scrambler, Snacks, Multi-purpose tool
   - Fake blood, Latex mask, Hologram necklace
   - Hot coffee flask, Digital watch, Flashlight 

  saint:
    name: The Monitor
    form: A ghostly anchorperson inside a TV screen | A humanoid mass of flesh, cables, and electronic parts
    shrine: Small empty backroom containing a CRT screen
    clergy: Bored and obnoxious VHS store clerk who wears only black
    omen: Low, loud buzzing
    relic: Low, loud buzzing

  scars:
   - PRIME-TIMED. Your facial muscles contract with pain beyond imagination. Your face changes shape and reveals an ominous secret about you. Which secret is revealed?
   - MORPHED. Your flesh merges with an item you are carrying or touching. How does the absorbed object alter your personality?
   - ARCHIVED. You’re plugged into the creepy video archive of Channel 7, and discover you have a direct connection with your Saint, the Monitor. What happened to the two of you?
   - LIVE. You’re live on every TV tuned into Channel 7. You’re popular now. Forget privacy. What do you tell the masses? 
   - ERASED. Weird rushes into your synaptic network and reformats it. You can't use your gifts anymore. You’re back to being ungifted. How does this change the way you relate to the rest of the party?
   - VHSED. Your belly rips open and a plastorganic VHS tape emerges from within. It contains the video of your life up to the moment you press play. Watch it and recreate your character from scratch. When the tape ends, it bubbles into a lump of melted plastic. What does the tape tell you about your achievements and failures?
 