- vibe: Splinter
  by: Iko
  description: >
    You’re so broken that you can’t break anymore. You’ve been through it all and fear nothing, except what secretly haunts you. Even as you long for a home you can’t stay still, roaming endlessly through the Lost Bay and valuing freedom above all else. The road is yours, for better or worse.
  
  offering:
    - Wreck something you cherish
    - Give blood
    - Take the road 
    - Get a facial tattoo
    - Assist those in need
    - Start a bar fight

  gifts:
    - INTIMIDATE, foes won’t harm you, for a while
    - SHATTER, break something sturdy
    - JINX, make a target break everything they touch
    - GIVE BACK, inflict whatever damage or pain you take
    - METABOLIZE, annihilate effects of drugs and liquors
    - SHELTER, touch something or someone to protect from harm, you still get hurt

  gear:
    - Broken spoon, Black metal t-shirt, Bus pass
    - Heavy bronze ring, Torn polaroid, Screwdriver
    - Hospital bracelet, Dried mushrooms, Toothpaste
    - Jagged brass knuckles, Meat jelly, Inflatable cushion
    - Bloodstained stone, Soda can, Road map
    - Carved revolver grip, Car keys, Short rope

  saint:
    name: Hardcore Wanderer
    form: Man with shaved head, worn-out parka, and sleeping bag | A pack of raging dogs
    shrine: Abandoned underpass
    clergy: Three silent, scarified hobos
    omen: Growling
    relic: Broken femur - when stabbed into a Weird creature, the creature reveals its weakness and the femur turns to dust

  scars:
  - STRAINED. You fall to your knees, exhausted. You’ve been wandering for too long. You need a break, and you need to cry. What do you stop doing that has been causing you to drift away?
  - BROKEN. You lose control of the Weird. It shatters a piece of you. Which piece?
  - RUGGED. Your anger overwhelms you. You need to let it out by hurting somebody who doesn't deserve it. Do you accept your rage, or feel guilty about it?
  - CRUSHED. The power of the Weird terrifies you. You freeze in this fear, and can't use your Gifts until you get your next Scar. You're vulnerable again. How does this change your relationship with one of your companions?
  - TROUBLED. You remember a painful memory and are overcome with nausea. You lose touch with the people and things around you. What did you do that encumbers your soul?
  - RESTLESS. Once more, the mellow voice of the road calls to you. All quests become meaningless, all possessions worthless, all relationships unbearable burdens. You flee, physically or otherwise. Does this make you feel free, or lonely?
