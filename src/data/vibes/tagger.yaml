- vibe: Tagger
  by: Stazie
  description: >
   You roam the streets at night, tagging the crumbling bricks of buildings, crooked stop signs, abandoned lots, and billboards. The neighbors complain and the police chase you down, but they don't get it; you're an artist. You tell stories, send messages, and take a stand with your urban artistry. It's a lonely life; people only know you by your tag, though it's hard to hide the paint staining your hands. You find yourself down alleyways and inside abandoned buildings, making the ugly more interesting.

  offering:
    - Inhale paint vapors until your nose bleeds
    - Use your skin as a canvas
    - Leave your tag in the cemetery
    - Give yourself a piercing
    - Throw paint against a wall and read the shapes
    - Balance on the edge of something high above

  gifts:
    - Exit, paint a door to an unknown location
    - Inking, your touch can turn flesh into dripping ink
    - Nocturnal, you can see in the dark
    - Pigment, Change the color of your hair, eyes and clothes
    - Signs, read secrets within street art and graffiti
    - Stunts, climb, leap and scamper over obstacles easily

  gear:
    - Spraypaint, Skateboard, Bandana
    - Sharpie, Duct tape, Chain belt
    - Stickers, Sour candy, Bucket hat
    - Box of Chalk, Movie tickets, Rollerblades
    - Paint can, Baggy jeans, Trading cards
    - Posters, Butterfly knife, Secondhand bicycle

  saint:
    name: The Hand that Bleeds
    form: A 20-something with ripped jeans, bandaged knees, stringy hair, and red tinted glasses that make their eyes look red (or are they actually?) Finger tips soaked in their own blood leave their signature tag in dark corners of the Bay. | A smeared bloody handprint left behind 
    shrine: Abandoned traincar, so covered in graffiti you almost can't see the rusting metal underneath
    clergy: A group of street kids
    omen: Paint turns to blood, dripping down walls
    relic: Spray paint of the Unseen, spray over something to hide or reveal

  scars:
    - ISOLATED. Your loneliness eats away at you, if you don't interact with someone in a meaningful way, you'll fade away. Are you desperate for a connection or do you resent your need for them? 
    - TERRITORIAL. You feel exposed and displaced in your surroundings, you have to make it your own. You're overcome with the need to cover a space with your signature tag over and over, ignoring your throbbing wrist and strained eyes. Who or what are you afraid of invading your space?
    - IMPOSTER. The power of the weird has warped your perception, you hate everything you make, but you can't stop creating. What do you change about yourself to ease the hatred?
    - KNOWN. You're marked with the tag you've put all over the Bay, it sits underneath your eye like a tattoo, and what used to keep you anonymous is now the first thing others see when they look at you. Is it a relief to be known or do you fear it?
    - TRANSFUSION. The Hand the Bleeds joins their blood with yours and you are compelled to make street art that comes to life and terrorizes the surrounding area. What did you summon with your graffiti?
    - EXHIBIT. The weird overwhelms you, your body becoming swirls of color, absorbed into the wall or ground near you, becoming an artistic rendition of your soul, forever watching people pass. Does your form look like you or how others saw you, or even how you saw yourself?