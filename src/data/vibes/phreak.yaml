- vibe: Phreak
  by: Ross Burton
  description: >
    You hack into systems, intercept calls, liberate information.  Other people can be unpredictable, but in a world where they only see confusion you can see the underlying pattern/order/flow. Anything electronic — analogue or digital — can be bent to your will.  You are a Phreak, and you serve the Superuser.

  offering:
    - Hack into a bank or gov agency, and release valuable information.
    - Chat all night on a private BBS.
    - Write a new game in machine code.
    - Watch Hackers until sunrise.
    - Crack a brand new encryption algorithm.
    - Crush up and snort a computer chip to start the day on a high.

  gifts:
    - Decipher. Subtle patterns, secret codes, cryptic crosswords: all as clear as day.
    - Hack. Take control of any computer system you can access.
    - EMP. Disrupt all nearby electronics.
    - Doxxed. Learn a secret.
    - Glitch. Cause something to malfunction.
    - Antisocial. People avoid engaging with you, no matter what you do.

  gear:
    - HACKER, a true l33t hax0r. Ghost In The Shell t-shirt, graphing calculator, code that you don't remember writing, unsolved cipher text
    - GRADUATE, hard working research student by day, servant to The Superuser by night. PalmPilot, login to a university network, long overcoat, cursed Tamagotchi
    - SIREN CHASER, always listening to private channels. Radio scanner, list of police frequencies, cavernous messenger bag, lock pick set
    - BRAINDANCER, works best listening to frantic beats and broken samples. Portable MiniDisc recorder, Ddirectional mic and headphones, Aphex Twin record bag, pocket knife
    - PHONE PHREAK, using and abusing the telephone network. Pager, telecom exchange manual, tone generator, cargo pants
    - GAMER, GameBoy all day, LAN party all night. GameBoy, pocket multitool, energy drink, oversized hoodie

  saint:
    name: The Superuser
    form: Distorted projection of a figure, hood pulled tight and face in shadow / Pulsating cloud of chaotic darkness, reaching out to bridge worlds.
    shrine: Neglected basement of a college, filled with hardware.
    clergy: Nervously excited students.
    omen: Flickering screens, momentary glitches, omnipresent mains hum.
    relic: Network cable with a bloody, frayed end. Insert into your flesh to access a network mentally.

  scars:
    - OPTICAL. Your nerves are upgraded to shimmering glass fibres and now the world seems so slow. Do you feel superior to everyone else?
    - DATA DUMP. Vast amounts of information briefly floods your mind, some useful, some harrowing. A few fragments linger. What can you remember?
    - NETWORKED. You suddenly have a strong desire to talk with as many people as possible. Who did you meet, and what did they want?
    - REMOTE CONTROL. The Superuser takes over your body for the rest of the day, you can watch but have no control. What did it do with you?
    - CONTROL-ALT-DELETE. You've been reset and collapse unconscious. Upon waking you have no memories of the last hour. Can you trust what you're told happened?
    - UPLOADED. You collapse, convulsing, as your mind is uploaded to merge with The Program. Now your body is useless and your self is unrecognisable.  What was your final thought?
