- vibe: Zombi
  by: Robert Is Lost In The Wires

  description: >
    Everyone said you ran away, that you started over somewhere far from the Bay, or that you were just laying low for a while. They were all wrong – dead wrong. Something, or someone, left you to die and you weren’t going to take it lying down. This is your chance to rejoin the living. Don’t let it slip away. You’re a Zombi, and you serve Candy the Skull.

  offering:
    - Sleep in the dirt
    - Take a shot of embalming fluid. It won’t hurt you – maybe.
    - Arrange dead things around yourself
    - Talk as if someone you lost can hear you
    - Put yourself somewhere dark and cramped
    - Let a crow peck at you

  gifts:
    - CENTRE OF THE ABYSS, Gain absolute focus and oneness. You stop breathing
    - CARRION CALLER, Scavengers and vermin heed you – for now
    - ROT, Something you touch withers, or rusts, or decays
    - EVP, Spy through nearby electronics – radios, cameras, computers
    - BLOODLETTER, Use your own life force to heal a friend
    - PROMETHEAN, Tear something down. Rescue someone from danger

  gear:
    - Newspapers (covered in mud), Parka, 3 Bucks
    - Roll of Quarters, Blood-Stained Shirt, Postcard
    - Motorcycle Keys, Cracked Helmet, Ten-Inch Length of Chain
    - Tarot Cards, Razors (x3), Belted Clothes
    - Thermos, Dog Collar, Denim jacket
    - Tote Bag, Swiss Army Knife, Sunglasses

  saint:
    name: Candy the Skull
    form: A short woman with a skull mask. | A room full of bones
    shrine: The memorial for that five-car pileup on Birchmount Lane
    clergy: Taxidermists
    omen: See your own breath
    relic: d6 COFFIN NAILS. Immobilises a target if driven into them or something related to them

  scars:
    - MEDIUM. If something died nearby, you’ll know; it will see you. It howls in sorrow and assails you with visions of its death. Who or what is this, and why does this matter?
    - PSYCHOPOMP. Appear before someone on the brink of death as you sleep. Do you try to bring them peace?
    - FROM BEYOND. Mist rolls in. People hear the voices of dead friends and family. Everyone except you must roll a Weird save. What message do the dead have for you?
    - INFECTION. The stench of your corpse attracts flies, hungry dogs, and crows, who begin to circle you. Are you willing to make them your allies, knowing that one day they might devour you?
    - RIGOR MORTIS. You’re supposed to stay dead, and your body knows it. Your joints lock up. Your movements slow. What are you willing to do to keep going?
    - ASH TO ASH. Parts of you are starting to fall off. Shove your bits back into place as they fall off and explode into dust. How does it feel to finally be done?
