- vibe: Firestarter
  by: Iko
  description: >
    You craft DIY hyper-incandescent flares and fireworks. Pouring rain won’t stop you from lighting a fire. You find comfort under the summer sun, or close to a bonfire, and you despise shadow and ambiguity. Ashes permanently stain your fingers. You’re fearless and bold, fascinated by fire and flames like the one that burns inside you. You’re a Firestarter, and you serve the Fire Demon, son of the Sun.

  offering:
    - Let the fire consume a part of you
    - Eat warm ashes
    - Incinerate all your worldly possessions
    - Stare into the flames all night
    - Walk on embers
    - Burn something living

  gifts:
    - SUFFOCATE, prevent someone from breathing
    - HEAT, control temperature
    - IGNITE, set on fire
    - DARE, overcome a perilous situation
    - SOOTHE, heal burn wounds
    - CHARGE, recover from conditions under sunlight

  gear:
    - Phoenix fireworks, Coral necklace, Red balaclava
    - Silver gas flask, Embroidered shirt, Prayer book
    - Scented suntan lotion, Cool sunglasses, Burned shoes
    - DIY flares, Chemicals, Rusted key
    - Pouch of ashes, Crystal knife, Braces
    - Screaming firecrackers, Hand-drawn map, 5 bucks

  saint:
    name: Fire Demon, son of the Sun
    form: A kid wandering under the scorching sun | A laugh living in flames
    shrine: Abandoned, rusty school bus
    clergy: Lonely, half-burned pyromaniac
    omen: Liquids boil
    relic: Black candle - when lit, all flammable materials on site ignite

  scars:
    - INCANDESCENT. Your eyes become red-hot, forever. It hurts like hell and gives you photophobia. What do you see that previously eluded you?
    - HAUNTED. You have a haunting vision of the Fire Demon devouring the Bay. You can’t get the vision out of your head, and can’t rest anymore. Is it a premonition, a vision of the past, or something else?
    - CONSUMED. Fire rushes through your veins. Your mouth tastes like ashes. You feel an urge to burn something, or someone. You can’t rest or sleep until you do. Accomplishing this frees you from a burden – which one?
    - DRAINED. Using Weird consumes you. You’ve never felt so fragile. From now on, you pass out every time you use a Gift. How does discovering your vulnerability alter your calling?
    - OVERWHELMED. Too much Weird. It’s smothering you. You’re suffocating and will die if no one assists you. Why do you trust, or distrust, those around you?
    - PHOENIXED. You’re a human pyre. Everything around you bursts into flame. You commune with the Fire Demon. What do the flames cleanse?
