- vibe: Screamer
  by: Iko
  description: >
    You build sprawling analog synthesizers. You know all the underground clubs of the Bay. You have an archive of natural and artificial sounds. Your voice is as sweet as honey, and as sharp as a fine blade. Your vocal chords can sing, charm, crush. There’s so much inside you, and you need to let it go. You’re a Screamer, and you serve The Nameless.
  
  offering:
    - Listen to white noise until you pass out
    - Record private conversations between strangers
    - Eat glass shards
    - Whisper nonsensical poetry to strangers
    - Sew your lips shut
    - Dissect someone’s inner ear or throat



  gifts:
    - AUDIOLOCATE, know the source of the sounds around you
    - SCREAM, shatter glass and bone
    - SILENCE, mute all sounds around you
    - SHUSH, put living beings to sleep
    - ECHO, fake voices and sounds
    - EXHORT, convince crowds to follow you

  gear:
    - Microcassette recorder, Tripod, Waterproof bag
    - Landline call recorder, Peanuts, Fake ID
    - MIDI player, Portable speaker, Headlamp
    - Iridescent makeup, Voice-altering collar, Audio cable
    - Rare vinyl, Silk tights, Energy drink 
    - Notebook, Walkman, Beanie



  saint:
    name: The Nameless
    form: Young kid with crystalline voice | Crowd in a mosh pit humming low-frequency drone sounds
    shrine: Dusty and crumbling opera house
    clergy: Choir of century-old singers
    omen: Kids and elders mumble in an unknown tongue
    relic: Blowing horn - put everyone to sleep

  scars:
    - CONNECTED. You hear the sound of the Weird flowing all around you. It gives you chills and makes you seek quiet. What truth do these noises tell about the Bay?
    - LARSEN. When you speak, your voice echoes in a distorted and uncanny way. Most people who hear you show visible discomfort. Does this make you feel strong, or unloved?
    - DISTORTED. Your voice sounds like broken glass. Others can no longer understand you – you’re free to say whatever you want. What do you whisper to a member of your party that they shouldn’t hear?
    - HOWL. You cannot hold it in any longer. You scream until your throat burns, glass shattering around you. What was so heavy that it needed to be let go? 
    - SHOCKWAVE. Your whole body emits a potent, droning sound. It’s repulsive, and kills someone. Who were they?
    - RESTLESS. The Nameless whispers its true name. Its voice forever echoes in your skull, and saturates your soul. How does knowing this name estrange you from reality?