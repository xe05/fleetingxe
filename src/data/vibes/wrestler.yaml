- vibe: Wrestler
  by: Robert Is Lost In The Wires
  description: >
    Trouble is your middle name. You dream of bright lights, loud music, and brutal bouts with millions of people watching you, cheering your name as you beat the living daylights out of someone in the ring. You’re willing to risk the pain, the damage, and the humiliation if it means becoming a household name. 
    You’re a Wrestler, and you serve Savage Sam.

  offering:
    - One hundred push-ups
    - High protein meal
    - Start a fight
    - Draw blood
    - Break something with your body
    - Cut a promo

  gifts:
    - OFF THE TOP ROPE. Leap high and land (relatively) safely
    - TAKEDOWN. Incapacitate a target, no matter how big they are
    - HEAVYWEIGHT CHAMP. Become immovable. Nothing gets past you
    - FACE TURN. Win someone over to your side
    - GRAND SLAM. Hit something hard. Put your back into it
    - SIGNATURE MOVE. Dazzling and devastating

  gear:
    - Helmet, Knee and Elbow Pads, Medal
    - Sunglasses, Tasseled Vest, Sixpack of Beer
    - Denim Bomber Jacket, Knuckle Dusters, Tattoos
    - Steel Folding Chair, Knee-High Boots, Leotard
    - Mouthguard, Track Shorts, Letter from Your Mentor
    - Garbage Can, Fake Blood Capsules, Hand-Me-Down Clothes

  saint:
    name: Savage Sam
    form: A bombastic, grinning giant | Fossilized cave bear skeleton
    shrine: Hawke Gym, long-abandoned after The Accident
    clergy: Exhausted trainees and their manager, Big Bill
    omen: Taste of blood
    relic: THE TURN-BUCKLE. A flashy belt, not unlike a Championship belt. Changes something’s trajectory sharply, gravity be damned

  scars:
    - DAZED AND CONFUSED. All it once, it feels like you’ve been hit in the head by something – and hard. The room spins, bloodlust wells up within you, and you take a swing at whoever or whatever is nearby. Who or what faces your wrath? Will you be forgiven for it?
    - THE TELL-ALL SPECIAL. Somehow, you manifest a documentary about your life, including the parts you really don’t want anyone knowing about. If there is a TV nearby, it will start playing. Otherwise, a tape will land in someone’s lap. There’s something in there you’re afraid of being known. What is it?
    - KAYFABE. You find it hard to tell where you begin and the Weird within you begins. You feel compelled to craft a new persona in order to match that. Your clothes and very aura change as a result. Who do you become? 
    - STEEL CAGE MATCH. Dropping around you and one other person – another PC, an NPC, whoever – an eight-foot, wrought-iron cage, trapping you two in a makeshift arena. Will you risk everything if it means getting out?
    - REVENANT RUMBLE. You end up knocked around by spectral combatants, trapped in the middle of a ghastly free-for-all. Do you come out on top and embrace your newfound aggression, or fall and keep your humanity? 
    - DOWN FOR THE COUNT. The crushing weight of the world pins you down. You hear Savage Sam counting down – One, Two, Three – and you fall through the world as though it were a tear in the mat. Give one last speech before the bell rings.
