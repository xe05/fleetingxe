- vibe: Blackhat
  by: Wren the Forrester
  description: >
   The Weird has a habit of going wrong. You exist to make it right. You search the woods for missing teenagers, knowing they’re already dead. You bury yourself in bureaucracy, losing yourself in the red tape. You pick yourself apart, cutting it all away until only purity remains. You are a Blackhat and you serve the Flame’d Lamplighter.

  offering:
    - Destroy something innocuously Weird
    - Eat a lit candle
    - Explore somewhere unsafe, alone
    - Fast for days, until you are pure
    - Research by lamplight until you pass out
    - Cut a toxin out of your life for good

  gifts:
    - WEIRDSENSE, pick up hints of Weird. Lit candles make it stronger
    - SMOKE BREAK, heal a condition by inhaling candle-smoke, takes 10 minutes
    - REVEAL, see through lies and illusions 
    - CLEANSE, excise curses or infections, may have side effects
    - STAY BACK, enemies can’t attack either you or an ally, until your concentration breaks
    - WATCHFUL EYE, pick a flame, you can vaguely see through it until extinguished

  gear:
    - ADHERENT. Scrap drawing of the Lamplighter, Knowing the Unknowable handbook, pointed hat
    - SPRAWLER. Self-rolled cigarettes, almost accurate map of the Bay, dowsing ki
    - CLERK. Fe-nix energy gum, ink-stained pen, stolen rubber stamp
    - BREACHER. Casket-Cloak, charred chapter badge, vicious wrecking-bar
    - ARCHIVIST. The Pierced Veil; the Outside and the Other book (banned), half a tarot deck, dripping divination pendulum
    - INVESTIGATOR. Counter Lantern, confiscated switchblade, heartrate monitor

  saint:
    name: The Flame'd Lamplighter
    form: A tall figure, silhouetted, with eyes that glow like fire 
    shrine: Its cell, deep within Chapterhouse #1
    clergy: The Speaker. Once there were more, only one remains
    omen: Everything becomes so, so bright
    relic: The Cremation Blades, given to those who can bear it

  scars:
    - OBLIGATION. A voice in the back of your head whispers. The Lamplighter has a job for you. What dreadful thing do they ask of you? What reward do They promise in return?
    - PURIFIED. The Weird inside you churns. It’s burning you, melting you from the inside out. How does your body reject the Weird?
    - CRAZED. Your skin cracks like dry clay, blinding white showing just underneath. It burns anything that comes too close. Who do you hurt, and how?
    - TRUE SIGHT The wool is pulled from your eyes. You can see Everything. Visions of simultaneous realities overlay and multiply, burning into your retinas. You lose sight in one of your eyes. What disturbing vision still haunts you?
    - EXTERMINATE. The Weird buzzes around you, incessant. You need to get rid of it. You have the urge to kill the next Weird creature you see. Do you succeed?
    - HOLLOWED. The Lamplighter has a hold on you. They’re carving you out. Making you fit to be Their Vessel, fit to hold Them. You lose yourself in Their image. What is your last thought before They take over?