- vibe: Painter
  by: Robert Is Lost In The Wires
  description: >
    Stained newspapers line the ground. Pots and take-out containers filled with cloudy coloured water. A canvas decorated in a mosaic of splotches. For years, you sought to shatter the creative block weighing you down – and now the Weird is your new muse. Art comes with a touch of madness, after all.
    You are a Painter and you serve The Critic.

  offering:
    - Decorate someone’s face
    - Empty a can of paint over yourself
    - Lay out a disturbing mural
    - Make a collage out of your dreams
    - Break a picture frame
    - Lock yourself away until inspiration comes

  gifts:
    - FORESHORTENING. Bend space to bring objects or people closer, or further away
    - THIRD DIMENSION. Create something simple out of a flat surface
    - SHADING. Shroud in darkness
    - A PERFECT CIRCLE. Create a protective barrier
    - WATERCOLOUR AND ACRYLIC. Change the properties of a liquid or a surface
    - PALETTE. Fill a space with dizzying colours

  gear:
    - Smock, Palette, Brush Set
    - Set of Pencils, Fingerless Gloves, Sketchbook
    - T-Square, Reference Book, Charcoal Sticks
    - Spray Paint (d6 different colours), Face Mask, Hoodie
    - Paint Can, Cargos, Roller
    - Palette Knife, Finger Paints, Coveralls

  saint:
    name: The Critic
    form: A stuffy man with a turtleneck and a pencil mustache | A hall of portraits
    shrine: The Rose Hill Memorial Gallery
    clergy: A procession of depressed art students
    omen: The smell of paint fumes
    relic: THE IMPOSSIBLE OBJECT. A cube that is very hard to look at. Alter a physical space so that it bends to your will. Loop a stairwell into itself. Make a chair leg part of a wall. The window leads into another, identical room

  scars:
    - PRELIMINARY SKETCH. Your vision blurs and everything looks as though it was drawn in pencil. You realize that you now see the core shape of everything around you. Does this terrify you or inspire you?
    - A MATTER OF PERSPECTIVE. Everything seems closer and yet also further away than before. Tables become massive. Nearby allies disappear into the distance. You lose object permanence. Is it better this way? If not, how do you recentre yourself?
    - HIDDEN MEANING. You see patterns in something mundane. They call out to you – literally. You must draw them, give them life and form. How do you bring them to reality, and what do you see?
    - BLANK CANVAS. You lose a memory. Which one, and was it important to your craft?
    - SECOND DRAFT. Your appearance changes drastically. You are unrecognizable, but somehow everyone knows it's you. Did it hurt? What do you look like, now?
    - PAINT THINNER. You melt into the world around you, reforming into something new and strange. An exquisite corpse of what you once were. The artist has become the art. What is your magnum opus?
