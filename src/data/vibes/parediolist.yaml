- vibe: Parediolist
  by: Overwhelming_Dog
  description: >
   You see faces in all things and everywhere, with the right words you can get them to do things for you. You serve the Demon of 1000 Faces.

  offering:
    - Lend your Face to something.
    - Draw faces all over your body.
    - Add another Doll to your collection.
    - Have an extended conversation with a stranger.
    - Persist with determination.
    - Give into the mania.

  gifts:
    - Mask - Something, a Sound
    - Project - Your Voice, a face
    - Open - A Mouth, a surface
    - Blind - Obscure vision
    - Through Another's - See through eyes
    - Animate - A Face, an object

  gear: 
    - Can of Spray Paint, Mask, Defaced photograph
    - Set of Permanent Markers, Compact Mirror, Burnt note
    - Doll, Set of reusable earplugs, Notepad and pencil
    - Sock monkey, Animal backpack, Pack of Crayons
    - Portable makeup set, Cassette voice recorder, Cracked CD
    - Polaroid Camera with Film, Roll of tape, Torn Scrapbook

  saint:
    name: Demon of 1000 Faces
    form: An Ambiguous figure, Shadows on empty streets, Glimpses of people you vaguely recognize
    shrine: Broken Mirror in a forgotten alley
    clergy: Travelling Puppet Show
    omen: Familiar, yet unrecognizable whispers
    relic: Rusty skinning Knife, It will never dull or break

  scars:
    - Dissociation - It’s not real, nothings real. Everything is happening to someone else.  Is it someone else? A Second Body? Or just another face?
    - PARANOID - Whispers from out of reach take hold of you. Watching and judging your actions. Are they warnings, hurtful or something else?*
    - CASCADE - The pores of your skin widen into small maws and begin singing your fears.  Do only you see and hear them, what can you do to silence them?
    - SPLIT - Your face splits open, revealing a 2nd face beneath, they are interchangeable.  How does this manifest, how do you handle that?
    - PROSOPAGNOSIA -  You see them everywhere, you just can’t remember anymore. You used to remember, and it hurts. How do you handle this new reality?
    - SPIRAL - The Weird is out of control, the faces you see are being made manifest. How do they help you?