- vibe: Mosher
  by: M. Allen Hall
  description: >
   If the music doesn't hurt, you're not doing it right. You always know where the next show will be. You serve the twin scene saints, the Amped and the Distorted.

  offering:
    - Scream until you lose your voice
    - Get a stranger to punch you in the face
    - Add a new band's logo patch to your backpack
    - Break a bone (yours or someone else's)
    - Scare a little kid
    - Sleep all night with metal at max volume in your headphones

  gifts:
    - Mosh Down, push nearby creatures away from you
    - Amped Up, ignore fatigue and lack of sleep
    - Distorted, become untouchable
    - Punk Presence, intimidate normies
    - Max Volume, deafen nearby creatures
    - Headbang, gather strength and momentum

  gear:
    - Oversized headphones, Steel toe boots, Face tattoo
    - Hair spray, Inverted cross necklace, Stiletto knife
    - Wallet chain, Massive gauge earrings, Dodgy Walkman
    - Studded leather choker, Black spray paint, Boombox
    - Stack of ticket stubs, Pack of cigarettes, Leather slapjack
    - Black denim battle vest, Brass knuckles, Guitar pick

  saint:
    name: The Amped and the Distorted
    form: Pair of tattooed and mohawked metalheads | Sound of a guitar riff at maximum volume 
    shrine: Music venue in a dark basement
    clergy: Everyone in the mosh pit
    omen: The sounds of birds and bugs ripple with distortion
    relic: Audiocassette, shatters all nearby glass

  scars:
    - PIT CRUSHED. You feel the Weird overwhelm you. You fall to the ground, the breath squeezed from your chest, and lie there motionless. When was the last time you felt this helpless? How did you get over it?
    - IN TUNE. You can hear music no one else can. From everywhere and nowhere, always in your mind. Who would you want to share the music with?
    - AMPED. The Amped screams in your ear, their words an unending screed of harsh words. The words scare you, though you cannot always understand them. What is the Amped asking of you? Can you meet their demands?
    - DISTORTED. The Distorted whispers in your ear, their voice nothing but soothing static. You feel yourself relax, knowing that the twins are always with you. What message do you hear in the static? What would you say in reply?
    - CROWDKILLER. You lash out at everyone around you. You cannot stop until someone gets hurt — badly. Who do you hurt? How does this loss of control make you feel?
    - BLOWN OUT. The Amped's voice in one ear, the Distorted's in the other, your mind is overwhelmed. You scream, a terrible crescendo to the point where you scream the life right out of your body. What is your final thought as the twins take you? What is the word that you are screaming?