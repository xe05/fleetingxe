- vibe: Root
  by: Robert Is Lost In The Wires
  description: >
    You are taken in by the greenery of The Bay – and it has taken to you, in turn. Whether florist, fledgling botanist, or just someone who loves gardening and strolls in the woods, you now speak for the plants. They do not have much to say, however, but you know they desire to be fed – one way or another.
    You’re a Root, and you serve The Chastain Sisters.

  offering:
    - Pull out weeds barehanded
    - Fertilize the earth with blood
    - Walk through a field barefoot
    - Re-pot some plants
    - Soak in some UV
    - Reap what you have sown

  gifts:
    - UNNATURAL BOUNTY. Create fruit out of anything. It’s always healthy, and always heals
    - SPROUT. Cause plants to rapidly grow. They may die just as quickly
    - DESERT ROSE. Cover yourself in thorns, cactus spines, or brambles
    - LICHEN UP. Slow something down by covering it in moss
    - AUTUMN COLOURS. Command fallen leaves
    - SEEDS OF DESTRUCTION. Turn nuts or acorns into projectiles

  gear:
    - Biodegradable Bags of Seeds (d6), Fake Leather Jacket, Skateboard
    - Trowel, Bag of Earth, Sunscreen
    - Shears, Thick Gloves, Container of Cherry Tomatoes
    - Floral Patterns, Pressed Leaves in a Book, Dried Tea in Little Packets (x3)
    - White Sage Stick, Earthen Colours, Long Jewelry
    - Hiking Boots, Pouch Full of Mushrooms, Binoculars

  saint:
    name: The Chastain Sisters
    form: Three identical women – Lilac, Poppy, and Bryony – in patterned dresses | A whirlwind of petals
    shrine: Rolling hills by the river in Deckard’s Grove
    clergy: The Landscapers
    omen: Allergies kick in
    relic: MANDRAKE BROACH. Screams when removed, and immobilizes all who hear it but you

  scars:
    - LANGUAGE OF FLOWERS. You hear a tree’s death rattle as it's cut down, somewhere nearby. Or perhaps the pained trilling of a rose bush being trimmed or a lawn being mowed. Are you filled with sorrow, righteous rage, or the realization that life is pain?
    - FUNGAL INFESTATION. The Weird takes one of your secrets, something you’ve been holding in for a long time, and uses it to make a field of mushrooms emerge out of somewhere cold and damp and dark. Are they poisonous or edible?
    - RED HARVEST. Tangles of vines start to grow from your own body, crimson stems and teardrop leaves. It hurts like hell. Do you rip them out or learn to live with them?
    - WORLD TREE. You are assailed by visions of a massive oak, taller than anything you’ve ever seen in the world. Something tells you to offer it something. Do you give it a piece of your body in order to see the future? If so, which part?
    - SPRING HAS SPRUNG. You start coughing – violently. Pollen, grass seeds, bits of pinecone, and more fly out of your mouth, and whatever hits the ground starts to grow. Do you keep it in or let nature reclaim the area around you?
    - COMPOST. All things must return to the earth. Your time has come. You hit the ground, become part of it, and a beautiful garden emerges from your rapidly-decaying body. Describe it – in your most flowery prose, of course.
