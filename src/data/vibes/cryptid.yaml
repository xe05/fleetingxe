- vibe: Cryptid
  by: Robert Is Lost In The Wires
  description: >
    You're fascinated by urban legends because you're something of one yourself. You're drawn to mysteries of all kinds – haunted houses, lights in the sky, lake monsters – but you are disconnected from others as a result. Greys and sasquatches are more interesting, anyway. People! Who needs them?
    You're a Cryptid, and you serve Tall Johnny.

  offering:
    - Take photos of an empty space
    - Hide in a corner
    - Pore over your notes obsessively
    - Appear beside or behind someone without them noticing
    - Stare at someone for an uncomfortably long period of time
    - Eat with your hands

  gifts:
    - SKUNK APE. To you, the truth smells rancid. Sniff out clues. Leave everything in a mess after
    - CHAMP. Vast knowledge and infectious calmness while navigating bodies of water
    - MOTHMAN. See something unseen as threads, afterimages, or something else
    - ROUGAROU. Gain strength under the light of the moon
    - FLATWOODS MONSTER. Temporarily blind a target, or flicker lights to distract them
    - CHANGELING. Become part of the background

  gear:
    - Old Map, Road Flare, Newfangled Camera
    - Baseball Bat, Stab Vest, Walkie-Talkie
    - Camo Gear, Binoculars, Hunting Knife
    - Caffeine Pills, Huge Coat, Library Card
    - Portable Game Console/Nudie Mags (pick one or the other), Rain Slicker, Bullhorn
    - Gym Membership, 10-Speed Bike, Heavy Boots

  saint:
    name: Tall Johnny
    form: A man, over seven feet tall, with obscured features | A never-ending nature trail
    shrine: Any shadowy alleyway, any flickering streetlamp
    clergy: Old Man Kale, what lives by the shack outside town
    omen: The rustling of leaves
    relic: BIGFOOT FANG NECKLACE. Held with a leather strap. Appear blurry or out-of-focus in any and all attempts to film or photograph you. Always be just far enough away that someone can't get a good look at you

  scars:
    - DOVELAND MEMORIES. You start to remember a town, or a place, or an incident that you had suppressed sealed away. What is it, and how does it tie to your investigations?
    - BAY GENESIS. Your sleep patterns are disrupted and you're more active at night. You stop moving and eating normally. Your smells are rank, and pungent. Your skin, pale and pallid. What colour are your eyes now?
    - NATURAL ENEMIES. Animals and inhuman things do not like you. Weird entities and angry wildlife will chase you instead of your allies. Is it worth it? Are you yourself not a beast?
    - PHOTOPHOBIC. You cannot be seen, not like this. You evade people's attempts to document you, or talk to you. The light feels like it's burning you. Are you afraid of people seeing what you really are?
    - GOATMAN'S RAGE. Nothing adds up, isn't that just so infuriating. You feel a need to break something – a window, a skateboard, a leg, anything. What will you destroy just to be in control again?
    - VANISHING ACT. Your desire to be hidden overwhelms your need to be among people. Tell us, were you ever even there?
