- vibe: Ech0
  by: sssalt
  description: >
    For a while it seemed like your disappearance would make you immortal. Your name on the news, your story showing up in online forums, a chain email threatening your appearance in the mirror if not forwarded to ten people. While time has blurred your identity, the system continues to function on its own. Every reiteration of you brings more distance until you're just a representation of a thing. You exist in the spaces between reality and memory - a flash of your features in the static of changing channels, your name in the crackle of a cassette, your voice left on the answering machine. You have become a digital ghost story witnessing yourself outside of yourself, an observer in a world that has chosen to forget. 
  
  offering:
    - Leave a harrowing message
    - Lose touch with a friend
    - Ruminate on your reflection in a black screen
    - Watch a candle burn for hours
    - Write a letter you wont get to send
    - Dial a number you know wont answer and listen to the silence

  gifts:
    - SOLILOQUY, Your voice doesn't come from your body
    - CONDUIT,  Look through the eyes of a CCTV camera
    - DISCONNECT, Sever a social bond
    - LAMENT,  Near beings are stricken with overwhelming grief
    - BLUR, ▓█▓▓▓██▓██████▓▓
    - WITNESS, Make eye contact and show someone the painful reverberations of what they’ve done
    - INHABIT, a piece of technology inhabit 

  gear:
    - Cracked walkman, photograph of faces, pocket light
    - Pager, worn love note, 3 CDs
    - Broken camcorder, picture of you, clump of hair
    - Cheat-code magazine, tarot card, dog collar with tags
    - Blank cassette, extendable antenna, 7 foreign coins
    - Disposable camera, half used journal, enamel pin of a video game character

  saint:
    name: 7H3 PUL53.
    form: A pulsating glob of translucent circuitry ▓█ an 8-bit skull
    shrine: www.▓█▓█.com
    clergy: Every NPC in a point and click adventure
    omen: A phone that won't stop ringing
    relic: cursed floppy disc - insert into an unplugged computer to conjure an artificial sentience 

  scars:
    - FEEDBACK. You hear what you think was your name in your head. Then again, and again and again. They start overlapping, echoing into a mind numbing feedback loop. All ears in the vicinity bleed. What is your true name?
    - PERSISTENCE. You feel a cold pull from beyond drawing you back to the nothingness you came from. It becomes hard for you to stay in the land of the living, let alone stay in the warm embrace of your friends. Are you really meant for this life? 
    - SIGNAL/LOST. You see a beam of light plummet down from who knows where. You don’t know why, but you know it's landing on someone you used to know. Your mind is overflowing with what could be either memories or stories. Which image sticks with you the most?
    - DISSOCIATE. It's getting harder to remain. The world around you gets colder and more distant every second. Your vision starts warping and stretching like a broken VHS. How do you centre yourself?
    - DIS-INTEGRATE. 7H3 PUL53 latches on to you. Sounds of dial-up overwhelm your thoughts and all you can see is static. In a tone more artificial fuzz than human, you hear "Do you want to see a ghost?" A blurry mimic of yourself appears in front of you and triggers [LAMENT]. You cannot interact with the outside world until you get this part of you back. 
    - ISOLATE. They say that ghosts don't want to kill people, because that would just make more ghosts and where would they go when the world is full of them? Instead, they want to isolate us, trapping us in separation forever. You are trapped in your loneliness. Your friends become shrouded in shadow. What would you like to tell them before vanishing from this world?
