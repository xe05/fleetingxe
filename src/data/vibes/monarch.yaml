- vibe: Monarch
  by: Iko
  description: >
    You distrust the world of humans and find comfort in small beings, like your brosisters the bugs. You spend entire afternoons lying in bed or over the moist undergrowth of a secular forest. You often change your taste in clothes and people, but suffer a persistent fear of spiders and everything else with eight legs. You’re a Monarch, and you serve Saint Jennifer, Larva Girl. 
  
  offering:
    - Bathe yourself in mud
    - Let bugs lay eggs under your skin
    - Hunt for fresh meat, and eat it raw and alive
    - Trash your clothes and steal new ones
    - Crawl under a stranger’s blanket and sleep a full night and day
    - Eat rotten trash


  gifts:
    - IMMUNE, recover from poisons and drugs
    - BUGSPEAK, converse with insects
    - MIMETIZE, go unnoticed
    - SWARM, summon a tide of bugs
    - MOLT, change your body and become stronger
    - HYPNOTIZE, make others do what you desire

  gear:
    - Buglife magazine, Bag of bug eggs, Magnifying glass 
    - Hair brush, Oversized hoodie, Stiletto knife
    - Mummified bug queen, Ultrasound beeper, Bug food
    - Vial of superacid, Chemistry notebook, Heavy-duty gloves
    - Pheromones, Glow-in-the-dark stick, Bugish tattoo
    - Bug costume, Club sandwich, Bug call mimicker


  saint:
    name: Saint Jennifer, Larva Girl
    form: Bored teenage girl | Human-mantis hybrid
    shrine: Sleeping bag covered in fibrous substance
    clergy: Cicadas soccer team
    omen: Larvaes hatched from flesh
    relic: Plastic hair brush – when used to brush someone’s hair, puts them into an irreversible slumber

  scars:
    - ACID. Your blood becomes acidic and you feel like you’re being eaten alive from the inside. You become restless and can't sleep a full night. What will you learn about yourself during these sleepless nights?
    - MAGGOT. You puke a stream of maggots. It hurts like hell. From now on, everything tastes rotten and you can't wash away a funny smell. People hesitate before approaching you. Does that make you free or lonely?
    - HIVE. You’re a living nest. Dozens of larvae burst from your skin. You’re lacerated, your skin covered with micro scars. You find your scarred skin beautiful, but what about it makes you feel dizzy.
    - NETWORK. You can hear bugs chomping, digging, buzzing all around you. Your brothers and sisters. You’re connected to them, you’re one of them. Your distrust of human things grows. What do you fear the most about the world of humans?
    - TIDE. The ground wiggles and all kinds of insects erupt, emerging to devour everything, everyone. You are covered by a fur of living bugs. Unharmed, you feel in control, like a true queen. How does this newly acquired sense of power make you reevaluate your Calling?
    - PREY. Her deep eyes hypnotise you as she appears from nowhere. She gently kisses you and lays a viscous egg in your mouth. You have a purpose now. You are a vessel for Saint Jennifer’s offspring. It'll hatch tomorrow. Are you scared or relieved?
